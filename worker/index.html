<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3;url=https://m1234532.github.io/worker-index/">
  <title>页面已迁移 - 打工人体质检测</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #F0F4F8 0%, #FFFFFF 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #2C3E50; margin-bottom: 12px; }
    p { font-size: 15px; color: #5D6D7E; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #4A90D9, #7FB3E8);
      color: #fff;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(74, 144, 217, 0.3);
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .countdown {
      margin-top: 20px;
      font-size: 13px;
      color: #95A5A6;
    }
  </style>
</head>
<body>
  <div class="emoji">💼</div>
  <h1>页面已搬家啦</h1>
  <p>打工人体质检测已迁移到新的地址<br>3秒后自动跳转...</p>
  <a href="https://m1234532.github.io/worker-index/" class="btn">立即访问新页面</a>
  <p class="countdown">如果没有自动跳转，请点击上方按钮</p>
  
  <script>
    // 倒计时显示
    let seconds = 3;
    const countdownEl = document.querySelector('.countdown');
    const timer = setInterval(() => {
      seconds--;
      if (seconds > 0) {
        countdownEl.textContent = `${seconds}秒后自动跳转...`;
      } else {
        clearInterval(timer);
      }
    }, 1000);
  </script>
</body>
</html>
